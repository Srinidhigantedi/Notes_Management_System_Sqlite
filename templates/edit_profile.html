{% extends 'base.html' %}
{% block title %}Edit Profile{% endblock %}
{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-md-5">
    <div class="card p-4">
      <h3 class="mb-4 text-center">✏️ Edit Profile</h3>

      <form method="POST" enctype="multipart/form-data">

        <div class="mb-3">
          <label class="form-label fw-semibold">Username</label>
          <input type="text" name="username" class="form-control"
                 value="{{ session.get('username') }}" required>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Email</label>
          <input type="email" name="email" class="form-control"
                 value="{{ session.get('email', '') }}" required>
        </div>

        <div class="mb-4">
          <label class="form-label fw-semibold">Profile Picture</label>

          <!-- Show current pic if exists -->
          {% if session.get('profile_pic') %}
            <div class="mb-2 text-center">
              <img src="{{ url_for('static', filename='uploads/' + session.get('profile_pic')) }}"
                   class="current-upload-preview" alt="Current">
              <p class="small text-muted mt-1">Current picture</p>
            </div>
          {% endif %}

          <input type="file" name="profile_pic" class="form-control" accept="image/*">
        </div>

        <button type="submit" class="btn btn-primary w-100">
          💾 Save Changes
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
