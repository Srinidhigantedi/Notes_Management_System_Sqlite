{% extends 'base.html' %}
{% block title %}My Profile{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-md-5">

    <div class="card p-4 text-center">

      <div class="mb-4">

        {% if session.get('profile_pic') %}
          <img src="{{ url_for('static', filename='uploads/' + session.get('profile_pic')) }}"
               class="profile-page-pic"
               alt="Profile Picture">
        {% else %}
          <div class="profile-page-placeholder">
            {{ session.get('username')[0].upper() }}
          </div>
        {% endif %}

      </div>

      <h2>{{ session.get('username') }}</h2>

      <p class="text-muted">
        {{ session.get('email', 'No email on file') }}
      </p>

      <a href="{{ url_for('edit_profile') }}"
         class="btn btn-primary">
         ✏️ Edit Profile
      </a>

    </div>

  </div>
</div>
{% endblock %}
